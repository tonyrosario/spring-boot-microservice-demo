name: CI

# Run on every branch push for fast feedback.
# Coverage gate is only enforced on main and PRs targeting main.
on:
  push:
  pull_request:
    branches: [ main ]

# github.head_ref is set on pull_request (source branch name, e.g. "my-feature").
# github.ref_name is the short ref on push (e.g. "my-feature", without "refs/heads/").
# Together they collapse push + pull_request events for the same branch into one group.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile, lint, and test
        run: ./gradlew checkstyleMain checkstyleTest test

      - name: Generate coverage report
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: ./gradlew jacocoTestReport

      - name: Enforce coverage gate
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: ./gradlew jacocoTestCoverageVerification

      - name: Upload JaCoCo report
        if: "!cancelled() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')"
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: build/reports/jacoco/
          retention-days: 14
